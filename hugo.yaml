baseURL: "https://yuhanghuang.github.io/"
languageCode: "zh-cn"
title: "Yuhang's Blog"
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

params:
  env: production
  title: "Yuhang's Blog"
  description: "技术笔记与思考"
  author: "Yuhang Huang"

  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true

  homeInfoParams:
    Title: "Hi, I'm Yuhang"
    Content: "欢迎来到我的博客，这里记录技术笔记与思考。"

  socialIcons:
    - name: github
      url: "https://github.com/yuhanghuang"

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: about
      name: About
      url: /about/
      weight: 30

outputs:
  home:
    - HTML
    - RSS
    - JSON
